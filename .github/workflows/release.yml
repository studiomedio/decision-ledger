name: Release

# Publishes the extension when a version tag (e.g. v1.0.0) is pushed.
# Requires repo secrets:
#   VSCE_PAT    — Azure DevOps PAT with Marketplace → Manage scope
#   OVSX_TOKEN  — Open VSX access token (optional; the Open VSX step is best-effort)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Package
        run: npx vsce package -o decision-ledger.vsix

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath decision-ledger.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX
        continue-on-error: true
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx ovsx publish decision-ledger.vsix -p "$OVSX_TOKEN"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" decision-ledger.vsix --title "$GITHUB_REF_NAME" --generate-notes
